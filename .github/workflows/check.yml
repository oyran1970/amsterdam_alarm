name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"  # kjør hvert 5. minutt
  workflow_dispatch:       # gjør det mulig å starte manuelt

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Hent koden
      - uses: actions/checkout@v4

      # Sett opp Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installer dependencies
      - run: pip install -r requirements.txt

      # Installer Playwright med nødvendige avhengigheter
      - run: npx playwright install --with-deps

      # Lag loggmappen om den ikke finnes
      - run: mkdir -p log

      # Kjør ticket_checker script
      - name: Run ticket checker
        run: python3 amsterdam_alarm/ticket_checker.py
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}

      # Deploy log til gh-pages
      - name: Deploy log to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add log/ticket_checker.log
          git commit -m "Update ticket log"
          git push -f https://$GH_PAT@github.com/oyran1970/amsterdam_alarm.git gh-pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
