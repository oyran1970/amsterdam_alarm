name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"   # hvert 5. minutt (UTC)
  workflow_dispatch:

permissions:
  contents: write   # KRITISK for å kunne pushe til gh-pages

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Install Playwright browser (uten system deps)
      - name: Install Playwright browser
        run: playwright install chromium

      # 5️⃣ Ensure log folder exists
      - name: Prepare log folder
        run: mkdir -p log

      # 6️⃣ Run ticket checker
      - name: Run ticket checker
        run: |
          echo "===== Run $(date) =====" >> log/ticket_checker.log
          python amsterdam_alarm/ticket_checker.py >> log/ticket_checker.log 2>&1
          echo "" >> log/ticket_checker.log
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}

      # 7️⃣ Deploy log to gh-pages
      - name: Deploy log to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin
          git checkout -B gh-pages

          mkdir -p log
          touch log/ticket_checker.log

          git add log/ticket_checker.log
          git commit -m "Update ticket log $(date)" || echo "No changes"

          git push origin gh-pages --force
