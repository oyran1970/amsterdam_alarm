name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"   # hvert 5. minutt (UTC)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Install Playwright browser ONLY (no system deps!)
      - name: Install Playwright browser
        run: playwright install chromium

      # 5️⃣ Ensure log folder exists
      - name: Prepare log folder
        run: mkdir -p log

      # 6️⃣ Run ticket checker and append log
      - name: Run ticket checker
        run: |
          echo "===== Run $(date) =====" >> log/ticket_checker.log
          python amsterdam_alarm/ticket_checker.py >> log/ticket_checker.log 2>&1
          echo "" >> log/ticket_checker.log
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}

      # 7️⃣ Push log to gh-pages branch (permanent URL)
      - name: Deploy log to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

          git checkout -B gh-pages

          mkdir -p log
          touch log/ticket_checker.log

          git add log/ticket_checker.log
          git commit -m "Update ticket log $(date)" || echo "No changes"

          git push -f https://$GH_PAT@github.com/oyran1970/amsterdam_alarm.git gh-pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
