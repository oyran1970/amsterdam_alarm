name: Ticket Checker

on:
  schedule:
    - cron: '*/5 * * * *'  # kjører hvert 5. minutt
  workflow_dispatch:

jobs:
  check_tickets:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install

      - name: Run ticket checker
        run: python ./ticket_checker.py

      - name: Commit and push log to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add log/ticket_checker.log
          git commit -m "Update ticket log $(date -u '+%a %b %d %H:%M:%S UTC %Y')"
          git push -f origin gh-pages
