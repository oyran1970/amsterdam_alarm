# amsterdam_alarm/ticket_checker.py

print("Ticket checker starter...")

# --- Playwright del ---
try:
    from playwright.sync_api import sync_playwright
    print("Playwright importert OK")
    
    with sync_playwright() as p:
        browser = p.chromium.launch(headless=True)
        page = browser.new_page()
        # Eksempel: gå til hovedsiden
        page.goto("https://www.tcsamsterdammarathon.eu/ticket-resale")
        print(f"Side lastet: {page.title()}")
        browser.close()
        print("Playwright-sjekk fullført")
except Exception as e:
    print(f"Playwright feilet: {e}")

# --- Twilio del ---
try:
    from twilio.rest import Client

    # Hent secrets fra miljøvariabler
    import os
    sid = os.getenv("TWILIO_SID")
    token = os.getenv("TWILIO_AUTH_TOKEN")
    from_number = os.getenv("TWILIO_NUMBER")
    to_number = os.getenv("YOUR_NUMBER")

    if not all([sid, token, from_number, to_number]):
        print("Twilio-miljøvariabler mangler, hopper over SMS")
    else:
        client = Client(sid, token)
        message = client.messages.create(
            body="Test fra ticket_checker.py",
            from_=from_number,
            to=to_number
        )
        print(f"Twilio melding sendt, SID: {message.sid}")
except Exception as e:
    print(f"Twilio feilet: {e}")

print("Ticket checker ferdig")
