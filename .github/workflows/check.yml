name: Ticket Checker

on:
  workflow_dispatch:    # manuelt triggbart
  schedule:
    - cron: "*/5 * * * *"  # automatisk hvert 5. minutt

jobs:
  check_tickets:
    runs-on: ubuntu-latest

    steps:
      # Hent koden
      - uses: actions/checkout@v3

      # Tillat safe directory for push
      - name: Allow Git safe directory
        run: git config --global --add safe.directory /github/workspace

      # Lag log-mappen hvis den ikke finnes
      - name: Ensure log directory exists
        run: mkdir -p log

      # Sett opp Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Installer avhengigheter
      - name: Install dependencies
        run: pip install -r ./requirements.txt

      # Installer Playwright-nettlesere
      - name: Install Playwright browsers
        run: playwright install

      # Kjør ticket_checker
      - name: Run ticket checker
        run: python amsterdam_alarm/ticket_checker.py

      # Push loggen til gh-pages
      - name: Commit and push log (gh-pages)
        uses: ad-m/github-push-action@v0.5.0
        with:
          branch: gh-pages
          directory: log
          force: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
