name: Check Tickets

on:
  schedule:
    # UTC: every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:  # for manual runs

jobs:
  check_tickets:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps=false

      - name: Run ticket checker
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: |
          mkdir -p log
          python ticket_checker.py >> log/ticket_checker.log 2>&1

      - name: Commit log to gh-pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          mkdir -p log
          cp log/ticket_checker.log log/ticket_checker.log
          git add log/ticket_checker.log
          git commit -m "Update ticket log $(date -u)"
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }} gh-pages --force
