name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"  # kjører hvert 5. minutt
  workflow_dispatch:       # lar deg starte workflow manuelt

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Sjekker ut repo
      - uses: actions/checkout@v4

      # Installer Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installer Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Installer Playwright og systemavhengigheter
      - name: Install Playwright
        uses: microsoft/playwright-github-action@v1

      # Debug: liste filer for å bekrefte struktur
      - name: List files
        run: ls -R

      # Kjør ticket_checker.py
      - name: Run ticket checker
        run: python3 amsterdam_alarm/ticket_checker.py
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}
