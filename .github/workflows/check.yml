name: Ticket Checker

on:
  workflow_dispatch:  # manuelt trigger
  schedule:
    - cron: "*/15 * * * *"  # kjør hvert 15. minutt

jobs:
  check_tickets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r amsterdam_alarm/requirements.txt

      - name: Run ticket checker
        run: python amsterdam_alarm/ticket_checker.py

      - name: Push log to gh-pages
        uses: ad-m/github-push-action@v0.5.0
        with:
          branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
          directory: log  # kun log-mappen
