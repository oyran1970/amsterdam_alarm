name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"   # hvert 5. minutt (UTC)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Hent repo
      - uses: actions/checkout@v4

      # Sett opp Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installer dependencies
      - run: pip install --upgrade pip
      - run: pip install -r requirements.txt

      # Installer Playwright
      - run: npx playwright install --with-deps

      # List filer (debug)
      - run: ls -R

      # Kjør ticket_checker.py og logg
      - name: Run ticket checker
        run: |
          python3 amsterdam_alarm/ticket_checker.py >> amsterdam_alarm/ticket_checker.log 2>&1
          echo "Run completed at $(date)" >> amsterdam_alarm/ticket_checker.log
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}

      # Push logg til gh-pages branch
      - name: Deploy log to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          mkdir -p log
          cp amsterdam_alarm/ticket_checker.log log/ticket_checker.log
          git add log/ticket_checker.log
          git commit -m "Update log"
          git push -f origin gh-pages
