name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"  # hvert 5. minutt
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Sjekk ut repo
      - uses: actions/checkout@v4

      # Sett opp Python 3.11
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installer avhengigheter
      - run: pip install -r requirements.txt

      # Installer Playwright og nødvendige systembiblioteker
      - run: |
          pip install playwright
          npx playwright install --with-deps

      # Lag loggmappen hvis den ikke finnes
      - run: mkdir -p log

      # Kjør ticket_checker.py og logg output
      - name: Run ticket checker
        run: |
          python3 amsterdam_alarm/ticket_checker.py \
            --log log/ticket_checker.log
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}

      # List filer for debugging (valgfritt)
      - name: List repo files
        run: ls -R

      # Deploy log til gh-pages
      - name: Deploy log to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages

          # Sørg for at loggfilen eksisterer
          mkdir -p log
          touch log/ticket_checker.log

          git add log/ticket_checker.log
          git commit -m "Update ticket log" || echo "No changes to commit"
          git push -f https://$GH_PAT@github.com/oyran1970/amsterdam_alarm.git gh-pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
