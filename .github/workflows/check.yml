name: Ticket Checker

on:
  workflow_dispatch:  # lar deg kjøre manuelt fra GitHub
  schedule:
    - cron: '*/5 * * * *'  # kjør hvert 5. minutt (kan justeres)

jobs:
  check_tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ticket checker
        run: python ticket_checker.py

      - name: Commit and push log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add log/ticket_checker.log
          git commit -m "Update ticket log $(date -u '+%a %b %d %H:%M:%S UTC %Y')" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages --force
