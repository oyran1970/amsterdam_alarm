name: Check Tickets

on:
  schedule:
    - cron: "*/5 * * * *"   # hver 5. minutt (UTC)
  workflow_dispatch:         # gjør det mulig å starte manuelt

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Hent repo
      - uses: actions/checkout@v4

      # Sett opp Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installer dependencies
      - run: pip install --upgrade pip
      - run: pip install -r requirements.txt

      # Installer Playwright med system-avhengigheter
      - run: npx playwright install --with-deps

      # List alle filer (for debugging)
      - name: List files
        run: ls -R

      # Kjør ticket_checker.py og logg output til fil
      - name: Run ticket checker
        run: |
          python3 amsterdam_alarm/ticket_checker.py >> amsterdam_alarm/ticket_checker.log 2>&1
          echo "Run completed at $(date)" >> amsterdam_alarm/ticket_checker.log
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}

      # Last opp loggfilen som artifact
      - name: Upload log file
        uses: actions/upload-artifact@v3
        with:
          name: ticket_checker_log
          path: amsterdam_alarm/ticket_checker.log
